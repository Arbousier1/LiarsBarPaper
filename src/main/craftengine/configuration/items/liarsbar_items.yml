furniture:
  liarsbar:table_visual:
    settings:
      item: liarsbar:table_visual
      hit_times: 5
      sounds:
        break: minecraft:block.wood.break
        place: minecraft:block.wood.place
        hit: minecraft:block.wood.hit
    variants:
      ground:
        loot_spawn_offset: 0,0.5,0
        entity_culling:
          view_distance: 64
          ray_tracing: false
        elements:
          - item: liarsbar:table_visual
            display_transform: none
            billboard: fixed
            translation: 0,0.35,0
            brightness:
              block_light: 15
              sky_light: 15
            view_range: 64
            shadow_radius: 1.2
            shadow_strength: 0.35
        hitboxes:
          # Model footprint: X -1.25..1.25, Z -0.9375..0.9375, top ~0.76 after element translation.
          - position: -0.75,0,-0.47
            type: shulker
            direction: up
            peek: 76
            blocks_building: true
            interactive: true
            interaction_entity: true
          - position: 0,0,-0.47
            type: shulker
            direction: up
            peek: 76
            blocks_building: true
            interactive: true
            interaction_entity: true
          - position: 0.75,0,-0.47
            type: shulker
            direction: up
            peek: 76
            blocks_building: true
            interactive: true
            interaction_entity: true
          - position: -0.75,0,0.47
            type: shulker
            direction: up
            peek: 76
            blocks_building: true
            interactive: true
            interaction_entity: true
          - position: 0,0,0.47
            type: shulker
            direction: up
            peek: 76
            blocks_building: true
            interactive: true
            interaction_entity: true
          - position: 0.75,0,0.47
            type: shulker
            direction: up
            peek: 76
            blocks_building: true
            interactive: true
            interaction_entity: true
    loot:
      template: default:loot_table/furniture
      arguments:
        item: liarsbar:table_visual

  liarsbar:seat_chair:
    settings:
      item: liarsbar:seat_chair
      hit_times: 3
      sounds:
        break: minecraft:block.wood.break
        place: minecraft:block.wood.place
        hit: minecraft:block.wood.hit
    variants:
      ground:
        loot_spawn_offset: 0,0.35,0
        elements:
          - item: liarsbar:seat_chair
            display_transform: none
            billboard: fixed
            translation: 0,0.42,0
            brightness:
              block_light: 15
              sky_light: 15
            view_range: 64
            shadow_radius: 0.55
            shadow_strength: 0.35
        hitboxes:
          # Seat position is CraftEngine-local: X/Z are the red cushion center.
          # Keep Y at 0 because CraftEngine applies the passenger seat height internally.
          - position: 0,0,0
            type: shulker
            direction: up
            peek: 100
            blocks_building: true
            interactive: true
            interaction_entity: true
            seats:
              - 0,0,-0.06 0
    loot:
      template: default:loot_table/furniture
      arguments:
        item: liarsbar:seat_chair
