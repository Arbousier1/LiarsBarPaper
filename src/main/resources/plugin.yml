name: LiarsBarPaper
version: '${version}'
main: com.jijifujiji.liarsbar.LiarsBarPlugin
api-version: '1.20'
authors: [hunterkyou, Paper-Port]
description: MC 版骗子酒馆 Paper 插件
commands:
  liarbar:
    description: 骗子酒馆主命令
    usage: /liarbar <create|delete|join|leave|start|stop|mode|select|play|challenge|info|help>
    aliases: [lb]
permissions:
  liarsbar.admin:
    description: 管理员权限（创建/删除桌子）
    default: op
  liarsbar.player:
    description: 玩家权限（加入/离开游戏）
    default: true
